# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/logos/tldr-square.png"

  android: "launcher_icon"
  # image_path_android: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "assets/backgrounds/podcasts.png"
  adaptive_icon_foreground: "assets/logos/tldr-square.png"
  adaptive_icon_foreground_inset: 16
  adaptive_icon_monochrome: "assets/logos/tldr-square.png"

  ios: true
  image_path_ios: "assets/logos/tldr-square.png"
  remove_alpha_ios: true
  image_path_ios_dark_transparent: "assets/logos/tldr-black.png"
  background_color_ios: "#3960B8"

  web:
    generate: true
    image_path: "assets/logos/tldr-square.png"
    background_color: "#3960B8"
    theme_color: "#3960B8"
