name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    name: Build App Deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set up Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1"
          channel: "stable"
          cache: true

      # Get Flutter dependencies
      - run: flutter pub get

      # `.env` is declared as a Flutter asset; CI creates an empty placeholder
      # so the bundle resolves. Real values come from --dart-define below.
      - name: Create empty .env placeholder
        run: touch .env

      # Build Flutter web. Secrets are injected as compile-time constants via
      # --dart-define, so they never touch the filesystem on the runner.
      - name: Build Flutter web
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_ANDROID_API_KEY: ${{ secrets.FIREBASE_ANDROID_API_KEY }}
          FIREBASE_IOS_API_KEY: ${{ secrets.FIREBASE_IOS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          flutter build web \
            --dart-define=FIREBASE_WEB_API_KEY="$FIREBASE_WEB_API_KEY" \
            --dart-define=FIREBASE_ANDROID_API_KEY="$FIREBASE_ANDROID_API_KEY" \
            --dart-define=FIREBASE_IOS_API_KEY="$FIREBASE_IOS_API_KEY" \
            --dart-define=YOUTUBE_API_KEY="$YOUTUBE_API_KEY"

      # Deploy to Firebase. webframeworks experiment is required because
      # firebase.json declares frameworksBackend (Flutter web framework mode).
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: tldr-news-229ac
          channelId: live
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
