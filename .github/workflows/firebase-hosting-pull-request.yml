name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    name: Build App Preview
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set up Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1"
          channel: "stable"
          cache: true

      # Get Flutter dependencies
      - run: flutter pub get

      # Materialize .env from GitHub Secrets
      - name: Create .env
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_ANDROID_API_KEY: ${{ secrets.FIREBASE_ANDROID_API_KEY }}
          FIREBASE_IOS_API_KEY: ${{ secrets.FIREBASE_IOS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          cat > .env <<EOF
          FIREBASE_WEB_API_KEY=${FIREBASE_WEB_API_KEY}
          FIREBASE_ANDROID_API_KEY=${FIREBASE_ANDROID_API_KEY}
          FIREBASE_IOS_API_KEY=${FIREBASE_IOS_API_KEY}
          YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
          EOF

      # Build Flutter web
      - run: flutter build web

      # Deploy to Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: tldr-news-229ac
          channelId: pr-preview
